<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
<style>
  html,body{margin:0;padding:0;height:100%;}
  #map{width:100%;height:100%;}
  .stop-label{font-family:Lora,serif;font-weight:700;color:#1c3d5a;font-size:13px;white-space:nowrap;background:rgba(255,255,255,.85);padding:1px 6px;border-radius:4px;}
</style>
</head>
<body>
<div id="map"></div>
<script>
const stops = [
  {name:"Ταλίν", lat:59.4370, lon:24.7536},
  {name:"Ελσίνκι", lat:60.1699, lon:24.9384},
  {name:"Ρίγα", lat:56.9496, lon:24.1052},
  {name:"Γιούρμαλα", lat:56.9682, lon:23.7712},
  {name:"Βίλνιους", lat:54.6872, lon:25.2797},
  {name:"Τρακάι / Κάουνας", lat:54.6383, lon:24.9339},
];
const accent = "#c65d3b", navy = "#1c3d5a";

const map = L.map('map', {scrollWheelZoom:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  subdomains: ['a','b','c'],
  maxZoom: 18
}).addTo(map);

const latlngs = stops.map(s => [s.lat, s.lon]);
setTimeout(() => { map.invalidateSize(); map.fitBounds(latlngs, {padding:[30,30]}); }, 100);
map.fitBounds(latlngs, {padding:[30,30]});

L.polyline(latlngs, {color: accent, weight: 3, dashArray: "2 10", lineCap: "round"}).addTo(map);

stops.forEach(s => {
  L.circleMarker([s.lat, s.lon], {
    radius: 7, fillColor: navy, color: "#fff", weight: 2, fillOpacity: 1
  }).addTo(map);
  L.marker([s.lat, s.lon], {
    icon: L.divIcon({className:"", html:`<div class="stop-label">${s.name}</div>`, iconAnchor:[-10,8]})
  }).addTo(map);
});
</script>
</body>
</html>
